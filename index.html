<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SAVIC Lead Capture</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:#f0f4f8;min-height:100vh}
header{background:linear-gradient(135deg,#1a3c6e,#2563eb);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
header img{height:32px}
header h1{font-size:16px;font-weight:600;flex:1;margin-left:10px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.pane{display:none;padding:16px;max-width:540px;margin:0 auto}
.pane.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:15px;color:#1e293b;margin-bottom:12px;font-weight:600}
.field-row{margin-bottom:12px}
.field-row label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.field-row input,.field-row textarea,.field-row select{width:100%;padding:10px 12px;border:1.5px solid #cbd5e1;border-radius:8px;font-size:14px;color:#1e293b;outline:none;transition:.2s}
.field-row input:focus,.field-row textarea:focus,.field-row select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field-row textarea{resize:vertical;min-height:72px}
.field-row input.filled{border-color:#10b981;background:#f0fdf4}
.mic-row{display:flex;gap:8px;align-items:flex-start}
.mic-row input,.mic-row textarea{flex:1}
.mic-btn{padding:10px 12px;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;color:#475569;transition:.2s;display:flex;align-items:center;gap:4px}
.mic-btn.on{background:#fef2f2;border-color:#ef4444;color:#ef4444}
.field-lit{border-color:#f59e0b!important;background:#fffbeb!important}
.voice-banner{display:none;background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#92400e;align-items:center;gap:8px}
.voice-banner.on{display:flex}
.voice-dot{width:10px;height:10px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af)}
.btn-secondary{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
.btn-danger{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:7px;width:auto}
.btn-green{background:#f0fdf4;color:#166534;border:1.5px solid #bbf7d0}
.snack{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;z-index:999;white-space:nowrap}
.snack.show{opacity:1;transform:translateX(-50%) translateY(0)}
.event-chip{display:inline-block;background:#eff6ff;color:#1d4ed8;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px}
.lead-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:4px solid #2563eb;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.lead-item h3{font-size:14px;font-weight:600;color:#1e293b}
.lead-item p{font-size:12px;color:#64748b;margin-top:2px}
.badge{background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px}
.event-admin-item{background:#f8fafc;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0}
.stats-row{display:flex;gap:10px;margin-bottom:14px}
.stat-box{flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-box .num{font-size:24px;font-weight:700;color:#2563eb}
.stat-box .lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.sep{height:1px;background:#e2e8f0;margin:14px 0}
#cardPreview{max-width:100%;border-radius:8px;margin-top:8px;display:none}
.li-row{display:flex;gap:8px;align-items:center}
.li-row input{flex:1}
.li-status{font-size:11px;color:#64748b;margin-top:4px}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:32px;height:32px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#2563eb;font-size:14px">S</div>
    <h1>SAVIC Lead Capture</h1>
  </div>
  <div style="font-size:20px" id="badge" onclick="showTab('leads')" style="cursor:pointer">0</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('capture')">📋 Capture</div>
  <div class="tab" onclick="showTab('leads')">📊 Leads <span class="badge" id="badgeTab">0</span></div>
  <div class="tab" onclick="showTab('admin')">⚙️ Admin</div>
</div>

<!-- CAPTURE PANE -->
<div class="pane active" id="paneCapture">

  <div class="card" id="signinCard">
    <h2>🔐 Event Sign-In</h2>
    <div class="field-row">
      <label>Select Event</label>
      <select id="eventSel">
        <option value="">-- Choose an event --</option>
      </select>
    </div>
    <div class="field-row">
      <label>Capture Token</label>
      <input type="password" id="tokenInput" placeholder="Enter token for this event"/>
    </div>
    <button class="btn btn-primary" onclick="doSignin()" style="margin-top:4px">Sign In →</button>
  </div>

  <div id="captureForm" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span class="event-chip" id="activeEventChip">Event</span>
      <button class="btn btn-secondary btn-sm" onclick="doSignout()">Sign Out</button>
    </div>

    <div class="voice-banner" id="vBanner">
      <div class="voice-dot"></div>
      <span id="vBannerTxt">Listening…</span>
    </div>

    <div class="card">
      <h2>👤 Lead Details</h2>

      <div class="field-row">
        <label>Full Name *</label>
        <div class="mic-row">
          <input type="text" id="fName" placeholder="e.g. Rajesh Kumar" class="field-input"/>
          <button class="mic-btn" id="mName" onclick="toggleMic('name')">🎙 Voice</button>
        </div>
      </div>

      <div class="field-row">
        <label>Company *</label>
        <div class="mic-row">
          <input type="text" id="fCompany" placeholder="e.g. Tata Consultancy Services" class="field-input"/>
          <button class="mic-btn" id="mCompany" onclick="toggleMic('company')">🎙 Voice</button>
        </div>
      </div>

      <div class="field-row">
        <label>Designation</label>
        <div class="mic-row">
          <input type="text" id="fDesig" placeholder="e.g. SAP Manager" class="field-input"/>
          <button class="mic-btn" id="mDesig" onclick="toggleMic('desig')">🎙 Voice</button>
        </div>
      </div>

      <div class="field-row">
        <label>Phone *</label>
        <div class="mic-row">
          <input type="tel" id="fPhone" placeholder="e.g. 9876543210" class="field-input"/>
          <button class="mic-btn" id="mPhone" onclick="toggleMic('phone')">🎙 Voice</button>
        </div>
      </div>

      <div class="field-row">
        <label>Email</label>
        <div class="mic-row">
          <input type="email" id="fEmail" placeholder="e.g. rajesh@company.com" class="field-input"/>
          <button class="mic-btn" id="mEmail" onclick="toggleMic('email')">🎙 Voice</button>
        </div>
      </div>

      <div class="field-row">
        <label>LinkedIn URL</label>
        <div class="li-row">
          <input type="url" id="fLinkedin" placeholder="https://linkedin.com/in/..."/>
          <button class="btn btn-green btn-sm" onclick="searchLinkedIn()">🔍 Search</button>
        </div>
        <div class="li-status" id="liStatus"></div>
      </div>

      <div class="field-row">
        <label>Business Card Photo</label>
        <input type="file" id="fCard" accept="image/*" capture="environment" onchange="previewCard(this)"/>
        <img id="cardPreview"/>
      </div>

      <div class="field-row">
        <label>Requirements / Notes *</label>
        <div class="mic-row">
          <textarea id="fReq" placeholder="Describe what the lead is looking for…" class="field-input"></textarea>
          <button class="mic-btn" id="mReq" onclick="toggleMic('req')">🎙 Voice</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="saveLead()" style="margin-bottom:10px">✅ Save Lead</button>
    <button class="btn btn-secondary" onclick="clearForm()">🗑 Clear Form</button>
  </div>
</div>

<!-- LEADS PANE -->
<div class="pane" id="paneLeads">
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">Total Leads</div></div>
    <div class="stat-box"><div class="num" id="statToday">0</div><div class="lbl">Today</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="field-row" style="margin-bottom:0">
      <label>Filter by Event</label>
      <select id="leadsEventSel" onchange="renderLeads()">
        <option value="">All Events</option>
      </select>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn btn-primary btn-sm" onclick="exportExcel()">⬇️ Export Excel</button>
    <button class="btn btn-danger btn-sm" onclick="clearAllLeads()">🗑 Clear All</button>
  </div>

  <div id="leadsList"></div>
</div>

<!-- ADMIN PANE -->
<div class="pane" id="paneAdmin">
  <div class="card" id="adminLoginCard">
    <h2>🔑 Admin Login</h2>
    <div class="field-row">
      <label>Admin Password</label>
      <input type="password" id="adminPass" placeholder="Enter admin password"/>
    </div>
    <button class="btn btn-primary" onclick="adminLogin()" style="margin-top:4px">Login →</button>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="card">
      <h2>➕ Add New Event</h2>
      <div class="field-row">
        <label>Event Name</label>
        <input type="text" id="newEvName" placeholder="e.g. SAP S/4HANA Workshop – Mumbai"/>
      </div>
      <div class="field-row">
        <label>Date</label>
        <input type="date" id="newEvDate"/>
      </div>
      <div class="field-row">
        <label>Capture Token (password for field team)</label>
        <input type="text" id="newEvToken" placeholder="e.g. sap2026"/>
      </div>
      <button class="btn btn-primary" onclick="addEvent()" style="margin-top:4px">Add Event</button>
    </div>

    <div class="card">
      <h2>📅 Events</h2>
      <div id="adminEvents"></div>
    </div>

    <button class="btn btn-danger btn-sm" onclick="adminLogout()" style="margin-top:4px">Logout</button>
  </div>
</div>

<div class="snack" id="sbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const EV_KEY='savic_events', LD_KEY='savic_leads', AD_PASS='savic@admin2026';
let events=[], leads=[], activeEvent=null, sr=null, af=null;

function init(){
  const ev=localStorage.getItem(EV_KEY); if(ev) events=JSON.parse(ev);
  const ld=localStorage.getItem(LD_KEY); if(ld) leads=JSON.parse(ld);
  populateEventSel();
  updateBadge();
  // auto-restore session
  const sess=sessionStorage.getItem('savic_sess');
  if(sess){
    const s=JSON.parse(sess);
    activeEvent=events.find(e=>e.name===s.name);
    if(activeEvent){showCaptureForm();}
  }
}

function populateEventSel(){
  const s=document.getElementById('eventSel');
  s.innerHTML='<option value="">-- Choose an event --</option>';
  events.forEach((ev,i)=>s.innerHTML+=`<option value="${i}">${ev.name}${ev.date?' ('+ev.date+')':''}</option>`);
}

function doSignin(){
  const idx=document.getElementById('eventSel').value;
  const tok=document.getElementById('tokenInput').value.trim();
  if(idx===''){toast('Please select an event');return;}
  const ev=events[parseInt(idx)];
  if(!ev){toast('Invalid event');return;}
  if(ev.token && tok!==ev.token){toast('❌ Wrong token');return;}
  activeEvent=ev;
  sessionStorage.setItem('savic_sess',JSON.stringify({name:ev.name}));
  showCaptureForm();
}

function showCaptureForm(){
  document.getElementById('signinCard').style.display='none';
  document.getElementById('captureForm').style.display='block';
  document.getElementById('activeEventChip').textContent='📍 '+activeEvent.name;
}

function doSignout(){
  activeEvent=null;
  sessionStorage.removeItem('savic_sess');
  document.getElementById('signinCard').style.display='block';
  document.getElementById('captureForm').style.display='none';
  clearForm();
}

function saveLead(){
  const name=document.getElementById('fName').value.trim();
  const company=document.getElementById('fCompany').value.trim();
  const phone=document.getElementById('fPhone').value.trim();
  const req=document.getElementById('fReq').value.trim();
  if(!name||!company||!phone||!req){toast('⚠️ Name, Company, Phone & Requirements are required');return;}
  const lead={
    id:Date.now(),
    event:activeEvent?activeEvent.name:'',
    name,company,
    designation:document.getElementById('fDesig').value.trim(),
    phone,
    email:document.getElementById('fEmail').value.trim(),
    linkedin:document.getElementById('fLinkedin').value.trim(),
    requirements:req,
    cardPhoto:document.getElementById('cardPreview').src||'',
    capturedAt:new Date().toISOString()
  };
  leads.push(lead);
  localStorage.setItem(LD_KEY,JSON.stringify(leads));
  updateBadge();
  clearForm();
  toast('✅ Lead saved!');
}

function clearForm(){
  ['fName','fCompany','fDesig','fPhone','fEmail','fLinkedin','fReq'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cardPreview').src='';
  document.getElementById('cardPreview').style.display='none';
  document.getElementById('liStatus').textContent='';
  stopMic();
}

function updateBadge(){
  const n=leads.length;
  document.getElementById('badge').textContent=n;
  document.getElementById('badgeTab').textContent=n;
  document.getElementById('statTotal').textContent=n;
  const today=new Date().toDateString();
  document.getElementById('statToday').textContent=leads.filter(l=>new Date(l.capturedAt).toDateString()===today).length;
}

function previewCard(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=document.getElementById('cardPreview');
    img.src=e.target.result;
    img.style.display='block';
  };
  r.readAsDataURL(f);
}

function searchLinkedIn(){
  const n=document.getElementById('fName').value.trim();
  const c=document.getElementById('fCompany').value.trim();
  if(!n){toast('Enter name first');return;}
  window.open('https://www.google.com/search?q='+encodeURIComponent('"'+n+'"'+(c?' "'+c+'"':'')+' site:linkedin.com/in'),'_blank');
  document.getElementById('liStatus').textContent='Copy the LinkedIn URL from Google and paste above';
}

// ── VOICE ────────────────────────────────────────────────────────────────────
const micMap={name:'fName',company:'fCompany',desig:'fDesig',phone:'fPhone',email:'fEmail',req:'fReq'};
const micLabel={name:'Full Name',company:'Company',desig:'Designation',phone:'Phone',email:'Email',req:'Requirements'};

function toggleMic(f){
  if(af===f){stopMic();return;}
  stopMic();
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice not supported on this browser');return;}
  sr=new SR(); sr.lang='en-IN'; sr.continuous=false; sr.interimResults=false;
  sr.onstart=()=>{
    af=f;
    document.getElementById('m'+cap(f)).classList.add('on');
    document.getElementById('m'+cap(f)).textContent='⏹ Stop';
    document.getElementById(micMap[f]).classList.add('field-lit');
    document.getElementById('vBanner').classList.add('on');
    document.getElementById('vBannerTxt').textContent='Listening for '+micLabel[f]+'… speak now';
  };
  sr.onresult=e=>{
    const t=e.results[0][0].transcript;
    const el=document.getElementById(micMap[f]);
    el.value=el.value?el.value+' '+t:t;
    el.classList.add('filled');
  };
  sr.onerror=()=>{toast('Mic error – check permissions');stopMic();};
  sr.onend=()=>stopMic();
  sr.start();
}

function stopMic(){
  if(sr){try{sr.stop();}catch(e){} sr=null;}
  if(af){
    const btn=document.getElementById('m'+cap(af));
    if(btn){btn.classList.remove('on');btn.textContent='🎙 Voice';}
    const inp=document.getElementById(micMap[af]);
    if(inp) inp.classList.remove('field-lit');
  }
  af=null;
  document.getElementById('vBanner').classList.remove('on');
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ── LEADS TAB ────────────────────────────────────────────────────────────────
function renderLeads(){
  const evFilter=document.getElementById('leadsEventSel').value;
  const list=evFilter?leads.filter(l=>l.event===evFilter):leads;
  const el=document.getElementById('leadsList');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:#94a3b8;padding:30px">No leads yet</div>';return;}
  el.innerHTML=list.slice().reverse().map(l=>`
    <div class="lead-item">
      <h3>${l.name} ${l.designation?'<span style="font-weight:400;color:#64748b;font-size:12px">– '+l.designation+'</span>':''}</h3>
      <p>🏢 ${l.company}</p>
      <p>📞 ${l.phone}${l.email?' &nbsp;✉️ '+l.email:''}</p>
      <p style="margin-top:4px;color:#475569">📝 ${l.requirements.substring(0,80)}${l.requirements.length>80?'…':''}</p>
      <p style="font-size:11px;color:#94a3b8;margin-top:4px">📍 ${l.event} &nbsp;•&nbsp; ${new Date(l.capturedAt).toLocaleString('en-IN')}</p>
    </div>
  `).join('');
}

function populateLeadsDropdown(){
  const s=document.getElementById('leadsEventSel');
  s.innerHTML='<option value="">All Events</option>';
  events.forEach(ev=>s.innerHTML+=`<option value="${ev.name}">${ev.name}</option>`);
  renderLeads();
}

function exportExcel(){
  if(!leads.length){toast('No leads to export');return;}
  const rows=leads.map((l,i)=>({
    '#':i+1,
    'Event':l.event,
    'Name':l.name,
    'Designation':l.designation,
    'Company':l.company,
    'Phone':l.phone,
    'Email':l.email,
    'LinkedIn':l.linkedin,
    'Requirements':l.requirements,
    'Captured At':new Date(l.capturedAt).toLocaleString('en-IN')
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:28},{wch:22},{wch:20},{wch:28},{wch:14},{wch:26},{wch:36},{wch:40},{wch:22}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'Leads',ws);
  XLSX.writeFile(wb,'SAVIC_Leads_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('✅ Excel downloaded!');
}

function clearAllLeads(){
  if(!confirm('Delete ALL leads? This cannot be undone.'))return;
  leads=[];
  localStorage.setItem(LD_KEY,JSON.stringify(leads));
  updateBadge();
  renderLeads();
  toast('Leads cleared');
}

// ── ADMIN ────────────────────────────────────────────────────────────────────
function adminLogin(){
  if(document.getElementById('adminPass').value===AD_PASS){
    document.getElementById('adminLoginCard').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    renderAdminEvents();
  } else {
    toast('❌ Wrong admin password');
  }
}

function adminLogout(){
  document.getElementById('adminLoginCard').style.display='block';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('adminPass').value='';
}

function addEvent(){
  const name=document.getElementById('newEvName').value.trim();
  const date=document.getElementById('newEvDate').value;
  const token=document.getElementById('newEvToken').value.trim();
  if(!name){toast('Event name required');return;}
  events.push({name,date,token});
  saveEvents();
  populateEventSel();
  renderAdminEvents();
  document.getElementById('newEvName').value='';
  document.getElementById('newEvDate').value='';
  document.getElementById('newEvToken').value='';
  toast('✅ Event added');
}

function deleteEvent(i){
  if(!confirm('Delete event "'+events[i].name+'"?'))return;
  events.splice(i,1);
  saveEvents();
  populateEventSel();
  renderAdminEvents();
  toast('Event deleted');
}

function renderAdminEvents(){
  const el=document.getElementById('adminEvents');
  if(!events.length){el.innerHTML='<div style="color:#94a3b8;font-size:13px">No events yet</div>';return;}
  el.innerHTML=events.map((ev,i)=>`
    <div class="event-admin-item">
      <div>
        <div style="font-size:13px;font-weight:600;color:#1e293b">${ev.name}</div>
        <div style="font-size:11px;color:#64748b">${ev.date||'No date'} &nbsp;•&nbsp; Token: <b>${ev.token||'(none)'}</b></div>
        <div style="font-size:11px;color:#64748b">Leads: ${leads.filter(l=>l.event===ev.name).length}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteEvent(${i})">Delete</button>
    </div>
  `).join('');
}

function saveEvents(){localStorage.setItem(EV_KEY,JSON.stringify(events));}

// ── TABS ─────────────────────────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['capture','leads','admin'][i]===t));
  ['capture','leads','admin'].forEach(id=>{
    document.getElementById('pane'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active',id===t);
  });
  if(t==='leads'){populateLeadsDropdown();}
  if(t==='admin'){renderAdminEvents();}
}

function toast(msg){
  const el=document.getElementById('sbar');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

init();
</script>
</body>
